name: build-windows

# Builds timetracker.exe on a real Windows runner (PyInstaller can't
# cross-compile from Linux). Runs on pushes to main, on version tags, and on
# demand. Download the exe from the run's Artifacts; tags also attach it to a
# GitHub Release.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed to publish the exe to a Release on tags

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: pyinstaller timetracker.spec --noconfirm

      - name: Smoke test the exe (CLI + web endpoints)
        shell: pwsh
        run: |
          .\dist\timetracker.exe --help
          .\dist\timetracker.exe seed-fake --days 3
          $p = Start-Process -FilePath .\dist\timetracker.exe `
               -ArgumentList "serve","--port","8765" -PassThru
          Start-Sleep -Seconds 10
          try {
            foreach ($path in @("/api/insights?days=28", "/api/sessions", "/api/digest", "/")) {
              $r = Invoke-WebRequest -UseBasicParsing "http://127.0.0.1:8765$path"
              if ($r.StatusCode -ne 200) { throw "$path -> $($r.StatusCode)" }
              Write-Host "OK $path"
            }
          } finally {
            Stop-Process -Id $p.Id -Force
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: timetracker-windows
          path: dist/timetracker.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/timetracker.exe
